<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Content Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #343541;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #202123;
            border-bottom: 1px solid #4a4b53;
            padding: 0 20px;
        }

        .tabs {
            display: flex;
            gap: 4px;
            max-width: 800px;
            margin: 0 auto;
        }

        .tab {
            padding: 14px 24px;
            background: transparent;
            color: #9ca3af;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s;
            border-radius: 8px 8px 0 0;
        }

        .tab:hover {
            background: #2a2b32;
            color: #e5e7eb;
        }

        .tab.active {
            color: white;
            background: #343541;
            border-bottom: 2px solid #10a37f;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .messages {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .message {
            display: flex;
            gap: 20px;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .message.user {
            background: transparent;
        }

        .message.assistant {
            background: #444654;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: #10a37f;
        }

        .message.assistant .message-avatar {
            background: #19c37d;
        }

        .message-content {
            flex: 1;
            line-height: 1.6;
            color: #ececf1;
            white-space: pre-wrap;
        }

        .generated-image {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 10px;
        }

        .input-container {
            border-top: 1px solid #4a4b53;
            background: #343541;
            padding: 20px;
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        .quick-prompts {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .quick-prompt-btn {
            background: #40414f;
            color: #ececf1;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: background 0.2s;
        }

        .quick-prompt-btn:hover {
            background: #10a37f;
        }

        .input-area {
            width: 100%;
            padding: 14px 50px 14px 18px;
            background: #40414f;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
        }

        .input-area:focus {
            outline: none;
            background: #4a4b53;
        }

        .input-area::placeholder {
            color: #8e8ea0;
        }

        .send-btn {
            position: absolute;
            right: 12px;
            bottom: 12px;
            background: #10a37f;
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            color: white;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .send-btn:hover {
            background: #1a7f64;
        }

        .mode-hint {
            font-size: 0.75rem;
            color: #8e8ea0;
            margin-top: 8px;
            text-align: center;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #10a37f;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .fallback-menu {
            background: #40414f;
            padding: 15px;
            border-radius: 12px;
            margin-top: 10px;
        }

        .fallback-menu h4 {
            color: #10a37f;
            margin-bottom: 12px;
        }

        .fallback-option {
            background: #343541;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .fallback-option:hover {
            background: #10a37f;
        }

        .fallback-option .number {
            color: #10a37f;
            font-weight: bold;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="tabs">
            <button class="tab active" onclick="switchMode('text')">📝 Text Generation</button>
            <button class="tab" onclick="switchMode('image')">🖼️ Image Generation</button>
            <button class="tab" onclick="switchMode('audio')">🎵 Audio Generation</button>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="messages" id="messages">
            <div class="message assistant">
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    Hello! I'm your AI Content Generator.<br><br>
                    Select a mode from the tabs above. For text, try the quick prompts or type your own topic!
                </div>
            </div>
        </div>
    </div>

    <div class="input-container">
    <div class="input-wrapper">
        <!-- Text Mode Input Area -->
        <div id="textInputArea">
            <div class="quick-prompts" id="textQuickPrompts"></div>
            <textarea id="textInput" class="input-area" rows="2" placeholder="Describe what you want to write about..."></textarea>
        </div>

        <!-- Image Mode Input Area -->
        <div id="imageInputArea" style="display: none;">
            <div class="quick-prompts" id="imageQuickPrompts"></div>
            <textarea id="imageInput" class="input-area" rows="2" placeholder="Describe the image you want to generate..."></textarea>
        </div>

        <!-- Audio Mode Input Area -->
        <div id="audioInputArea" style="display: none;">
            <div class="quick-prompts" id="audioQuickPrompts"></div>
            <textarea id="audioInput" class="input-area" rows="2" placeholder="Enter text to convert to speech..."></textarea>
        </div>

        <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>
    <div class="mode-hint" id="modeHint">💡 Text Mode: Click a quick prompt or type your own topic</div>
</div>

    <script>
    let currentMode = 'text';
    let currentFallbackAnswers = null;

    // Separate chat histories for each mode
    let chatHistories = {
        text: [],
        image: [],
        audio: []
    };

    // Quick prompts for text mode
    const textQuickPrompts = [
        "Write a blog post about the legendary VW 1.9 TDI engine reliability",
        "Write a blog post comparing VW 1.9 TDI vs 2.0 TDI engines",
        "Write a blog post about common problems and fixes for the VW 2.0 TDI",
        "Write a blog post about tuning and performance upgrades for TDI engines",
        "Write a blog post about the history of VW TDI diesel engines"
    ];

    // Quick prompts for image mode - descriptive and meaningful
    const imageQuickPrompts = [
        "A Shark",
        "A Rooster",
        "A Donkey",
        "Supra car",
        "Cat"
    ];

    // Quick prompts for audio mode - descriptive and meaningful
    const audioQuickPrompts = [
        "Nur is busy right about now",
        "Liverpool is not winning anything this season.",
        "My favourite car is a g-wagon.",
        "One two three four five six seven eight nine ten.",
        "Squat Bench and Deadlift."
    ];

    // Pre-written answers for text fallback (when API fails)
    const textFallbackAnswers = {
            0: `**The Legendary VW 1.9 TDI - Why It's Unkillable**

        The VW 1.9 TDI engine, particularly the ALH and PD versions, is legendary for its reliability. Many owners report exceeding 300,000 miles with basic maintenance. The mechanical injection pump on earlier models is simple and robust. The ALH engine (1998-2003) is considered the most reliable, while the PD (2004-2006) offers more power but with camshaft wear concerns. These engines routinely outlast the cars they're in and have a cult following worldwide.`,

            1: `**1.9 TDI vs 2.0 TDI - Which One is Better?**

        The 1.9 TDI is simpler, more reliable, and easier to work on. It lacks a DPF and has fewer emissions components that fail. The 2.0 TDI (common rail, 2008+) offers more power, smoother operation, and better fuel economy. However, the 2.0 TDI has known issues: failed DPF, clogged intake manifolds, failed EGR coolers, and dual-mass flywheel failures. For a daily driver, the 2.0 TDI is fine. For longevity and DIY maintenance, the 1.9 TDI wins.`,

            2: `**Common 2.0 TDI Problems and Fixes**

        The 2.0 TDI has several common issues: DPF clogging (solution: regular highway driving or delete), failed EGR valve (solution: clean or delete), failed dual-mass flywheel (solution: replace with solid flywheel), camshaft wear (use correct oil), and failed heater core (flush system). The good news is most problems have known fixes. The CP4 fuel pump is also a weak point - consider upgrading to a CP3 pump for reliability.`,

            3: `**Tuning Your TDI - Power Upgrades That Work**

        A simple tune (remap) on a 1.9 TDI ALH can take it from 90hp to 130hp with no hardware changes. Add bigger nozzles for 150hp. A VNT17 turbo plus tune can reach 170-180hp. For the 2.0 TDI, a stage 1 tune adds 30-40hp. Stage 2 with downpipe adds another 20hp. Keep EGTs in check and always monitor boost. A clutch upgrade is recommended above 300lb-ft torque. These engines respond incredibly well to tuning.`,

            4: `**The History of VW TDI Engines**

        VW introduced TDI (Turbo Direct Injection) in 1989. The 1.9 TDI came in several versions: VE (1996-2003) with mechanical injection pump, PD (2004-2006) with unit injectors, and then the 2.0 TDI common rail (2008+). The 1.9 ALH is the most beloved. Dieselgate (2015) hurt VW's diesel reputation, but the TDI community remains strong. These engines are known for torque, fuel efficiency (40-50mpg), and longevity when properly maintained.`
      };

    // Pre-generated images (stored locally)
    const preGeneratedImages = [
        "/static/images/image_0.jpg",
        "/static/images/image_1.jpg",
        "/static/images/image_2.jpg",
        "/static/images/image_3.jpg",
        "/static/images/image_4.jpg"
    ];

    // Pre-generated audio files (stored locally)
    const preGeneratedAudio = [
        "/static/audio/audio_0.mp3",
        "/static/audio/audio_1.mp3",
        "/static/audio/audio_2.mp3",
        "/static/audio/audio_3.mp3",
        "/static/audio/audio_4.mp3"
    ];

    // Store buttons for each mode
    let textButtons = [];
    let imageButtons = [];
    let audioButtons = [];

    function createButtonsForMode(mode) {
    const buttons = [];
    let prompts = [];

    if (mode === 'text') {
        prompts = textQuickPrompts;
    } else if (mode === 'image') {
        prompts = imageQuickPrompts;
    } else if (mode === 'audio') {
        prompts = audioQuickPrompts;
    }

    for (let index = 0; index < prompts.length; index++) {
        const prompt = prompts[index];
        const btn = document.createElement('button');
        btn.className = 'quick-prompt-btn';
        btn.textContent = prompt.length > 40 ? prompt.substring(0, 40) + '...' : prompt;
        btn.title = prompt;

        btn.onclick = (function(modeType, idx) {
            return function() {
                const fullPrompt = modeType === 'text' ? textQuickPrompts[idx] :
                                  (modeType === 'image' ? imageQuickPrompts[idx] : audioQuickPrompts[idx]);

                // Add user message
                addMessage(fullPrompt, true);

                if (modeType === 'text') {
                    // Text mode: use pre-written answers
                    addMessage(textFallbackAnswers[idx], false);
                } else if (modeType === 'image') {
                    // Image mode: use local static images
                    addMessage('', false, true, preGeneratedImages[idx]);
                } else if (modeType === 'audio') {
                    // Audio mode: use local static audio files
                    const audioUrl = preGeneratedAudio[idx];
                    console.log("Playing audio:", audioUrl);
                    addMessage('', false, false, null, true, audioUrl);
                }
            };
        })(mode, index);

        buttons.push(btn);
    }

    return buttons;
}

    function loadQuickPrompts() {
    // Get the correct container based on current mode
    let container = null;

    if (currentMode === 'text') {
        container = document.getElementById('textQuickPrompts');
    } else if (currentMode === 'image') {
        container = document.getElementById('imageQuickPrompts');
    } else if (currentMode === 'audio') {
        container = document.getElementById('audioQuickPrompts');
    }

    if (!container) {
        console.error("Container not found for mode:", currentMode);
        return;
    }

    // Clear container
    container.innerHTML = '';

    // Get prompts for current mode
    let prompts = [];
    if (currentMode === 'text') {
        prompts = textQuickPrompts;
    } else if (currentMode === 'image') {
        prompts = imageQuickPrompts;
    } else if (currentMode === 'audio') {
        prompts = audioQuickPrompts;
    }

    // Create buttons
    for (let i = 0; i < prompts.length; i++) {
        const btn = document.createElement('button');
        btn.className = 'quick-prompt-btn';
        btn.textContent = prompts[i].length > 40 ? prompts[i].substring(0, 40) + '...' : prompts[i];
        btn.title = prompts[i];

        btn.onclick = (function(idx, mode) {
            return function() {
                const fullPrompt = mode === 'text' ? textQuickPrompts[idx] :
                                  (mode === 'image' ? imageQuickPrompts[idx] : audioQuickPrompts[idx]);
                addMessage(fullPrompt, true);

                if (mode === 'text') {
                    addMessage(textFallbackAnswers[idx], false);
                } else if (mode === 'image') {
                    addMessage('', false, true, preGeneratedImages[idx]);
                } else if (mode === 'audio') {
                    addMessage('', false, false, null, true, preGeneratedAudio[idx]);
                }
            };
        })(i, currentMode);

        container.appendChild(btn);
    }

    console.log(`Loaded ${prompts.length} prompts for ${currentMode} mode`);
}

    function switchMode(mode) {
        currentMode = mode;
        currentFallbackAnswers = null;

        // Update tab active states
        const tabs = document.querySelectorAll('.tab');
        for (let i = 0; i < tabs.length; i++) {
            tabs[i].classList.remove('active');
        }

        // Find and activate the correct tab
        if (mode === 'text') {
            tabs[0].classList.add('active');
        } else if (mode === 'image') {
            tabs[1].classList.add('active');
        } else if (mode === 'audio') {
            tabs[2].classList.add('active');
        }

        // Show/hide input areas
        document.getElementById('textInputArea').style.display = mode === 'text' ? 'block' : 'none';
        document.getElementById('imageInputArea').style.display = mode === 'image' ? 'block' : 'none';
        document.getElementById('audioInputArea').style.display = mode === 'audio' ? 'block' : 'none';

        const hint = document.getElementById('modeHint');
        if (mode === 'text') hint.innerHTML = '💡 Text Mode: Click a quick prompt or type your own topic';
        else if (mode === 'image') hint.innerHTML = '🖼️ Image Mode: Click a quick prompt or describe an image';
        else hint.innerHTML = '🎵 Audio Mode: Click a quick prompt or enter text to convert to speech';

        // Reload quick prompts for the new mode
        loadQuickPrompts();

        // Load the chat history for this mode
        loadChatHistoryForMode(mode);
    }

    function loadChatHistoryForMode(mode) {
        const messagesDiv = document.getElementById('messages');
        messagesDiv.innerHTML = '';

        // Add welcome message for empty history
        if (chatHistories[mode].length === 0) {
            let welcomeText = '';
            if (mode === 'text') welcomeText = 'Hello! I\'m your AI Text Generator. Click a quick prompt or type your own topic!';
            else if (mode === 'image') welcomeText = 'Hello! I\'m your AI Image Generator. Click a quick prompt or describe an image you want to create!';
            else welcomeText = 'Hello! I\'m your AI Audio Generator. Click a quick prompt or enter text to convert to speech!';

            const welcomeDiv = document.createElement('div');
            welcomeDiv.className = 'message assistant';
            welcomeDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    ${welcomeText}
                </div>
            `;
            messagesDiv.appendChild(welcomeDiv);
        } else {
            // Restore all messages for this mode
            for (let i = 0; i < chatHistories[mode].length; i++) {
                const msg = chatHistories[mode][i];
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${msg.isUser ? 'user' : 'assistant'}`;

                const avatar = document.createElement('div');
                avatar.className = 'message-avatar';
                avatar.textContent = msg.isUser ? '👤' : '🤖';

                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';

                if (msg.isImage && msg.imageUrl) {
                    contentDiv.innerHTML = `<img src="${msg.imageUrl}" class="generated-image" alt="Generated Image">`;
                } else if (msg.isAudio && msg.audioUrl) {
                    contentDiv.innerHTML = `<audio controls src="${msg.audioUrl}" style="width: 100%;"></audio>`;
                } else {
                    contentDiv.innerHTML = msg.content.replace(/\n/g, '<br>');
                }

                messageDiv.appendChild(avatar);
                messageDiv.appendChild(contentDiv);
                messagesDiv.appendChild(messageDiv);
            }
        }

        const container = document.getElementById('chatContainer');
        container.scrollTop = container.scrollHeight;
    }

    function addMessage(content, isUser, isImage = false, imageUrl = null, isAudio = false, audioUrl = null) {
    // Store message in current mode's history
    chatHistories[currentMode].push({
        content: content,
        isUser: isUser,
        isImage: isImage,
        imageUrl: imageUrl,
        isAudio: isAudio,
        audioUrl: audioUrl
    });

    // Display message
    const messagesDiv = document.getElementById('messages');
    const messageDiv = document.createElement('div');
    messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;

    const avatar = document.createElement('div');
    avatar.className = 'message-avatar';
    avatar.textContent = isUser ? '👤' : '🤖';

    const contentDiv = document.createElement('div');
    contentDiv.className = 'message-content';

    if (isImage && imageUrl) {
        // Make sure the image URL is absolute or properly formatted
        let imgSrc = imageUrl;
        if (!imgSrc.startsWith('http') && !imgSrc.startsWith('/')) {
            imgSrc = '/' + imgSrc;
        }
        contentDiv.innerHTML = `<img src="${imgSrc}" class="generated-image" alt="Generated Image" style="max-width: 100%; border-radius: 12px; margin-top: 10px;" onerror="this.onerror=null; this.src='https://placehold.co/512x512?text=Image+Not+Found';">`;
        } else if (isAudio && audioUrl) {
        let audioSrc = audioUrl;
        if (!audioSrc.startsWith('http') && !audioSrc.startsWith('/')) {
            audioSrc = '/' + audioSrc;
        }
        contentDiv.innerHTML = `<audio controls src="${audioSrc}" style="width: 100%; margin-top: 10px;"></audio>`;
    } else {
        contentDiv.innerHTML = content.replace(/\n/g, '<br>');
    }

    messageDiv.appendChild(avatar);
    messageDiv.appendChild(contentDiv);
    messagesDiv.appendChild(messageDiv);

    const container = document.getElementById('chatContainer');
    container.scrollTop = container.scrollHeight;
}

    function showTypingIndicator() {
        const messagesDiv = document.getElementById('messages');
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message assistant';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = `
            <div class="message-avatar">🤖</div>
            <div class="message-content">
                <div class="loading"></div> Generating...
            </div>
        `;
        messagesDiv.appendChild(typingDiv);
        const container = document.getElementById('chatContainer');
        container.scrollTop = container.scrollHeight;
    }

    function removeTypingIndicator() {
        const indicator = document.getElementById('typingIndicator');
        if (indicator) indicator.remove();
    }

    function showFallbackMenu(fallbackData) {
        // Store fallback menu in history as a special message
        const menuHtml = '<div class="fallback-menu"><h4>⚠️ API is currently unavailable. Please choose from our library:</h4>' +
            fallbackData.quickPrompts.map((prompt, i) => `
                <div class="fallback-option" onclick="selectFallback(${i})">
                    <span class="number">${i + 1}.</span>
                    <span>${prompt}</span>
                </div>
            `).join('') + '</div>';

        // Store in history
        chatHistories[currentMode].push({
            content: menuHtml,
            isUser: false,
            isImage: false,
            isFallbackMenu: true
        });

        // Update display
        const contentDiv = document.querySelector('#messages .message:last-child .message-content');
        if (contentDiv) {
            contentDiv.innerHTML = menuHtml;
        }
        currentFallbackAnswers = fallbackData.fallbackAnswers;
    }

    async function selectFallback(index) {
        if (currentFallbackAnswers && currentFallbackAnswers[index]) {
            removeTypingIndicator();
            addMessage(currentFallbackAnswers[index], false);
        }
    }

    async function sendMessage() {
    let userMessage = '';

    if (currentMode === 'text') {
        userMessage = document.getElementById('textInput').value.trim();
        document.getElementById('textInput').value = '';
    } else if (currentMode === 'image') {
        userMessage = document.getElementById('imageInput').value.trim();
        document.getElementById('imageInput').value = '';
    } else if (currentMode === 'audio') {
        userMessage = document.getElementById('audioInput').value.trim();
        document.getElementById('audioInput').value = '';
    }

    if (!userMessage) return;

    addMessage(userMessage, true);
    showTypingIndicator();

    try {
        if (currentMode === 'text') {
            const response = await fetch('/generate/text', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: userMessage })
            });
            const data = await response.json();
            removeTypingIndicator();

            if (data.fallback) {
                showFallbackMenu(data);
            } else {
                addMessage(data.response, false);
            }

        } else if (currentMode === 'image') {
            const response = await fetch('/generate/image', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: userMessage })
            });
            const data = await response.json();
            removeTypingIndicator();
            addMessage('', false, true, data.imageUrl);

        } else if (currentMode === 'audio') {
            const response = await fetch('/generate/audio', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: userMessage })
            });
            const data = await response.json();
            removeTypingIndicator();

            if (data.audioUrl) {
                addMessage('', false, false, null, true, data.audioUrl);
            } else if (data.fallback) {
                addMessage('⚠️ Audio API is currently unavailable. Please use the pre-generated prompts above.', false);
            } else {
                addMessage('Error generating audio. Please try again.', false);
            }
        }

    } catch (error) {
        removeTypingIndicator();
        addMessage('Sorry, an error occurred. Please try again.', false);
    }
}

    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            const activeElement = document.activeElement;
            if (activeElement && activeElement.classList && activeElement.classList.contains('input-area')) {
                e.preventDefault();
                sendMessage();
            }
        }
    });

    // Initialize when page loads - create all buttons once
    document.addEventListener('DOMContentLoaded', function() {
        console.log("DOM loaded, creating all button sets...");
        textButtons = createButtonsForMode('text');
        imageButtons = createButtonsForMode('image');
        audioButtons = createButtonsForMode('audio');
        loadQuickPrompts();
    });
</script>
</body>
</html>
