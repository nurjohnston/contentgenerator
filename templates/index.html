<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Content Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #343541;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header with Tabs - ChatGPT Style */
        .header {
            background: #202123;
            border-bottom: 1px solid #4a4b53;
            padding: 0 20px;
        }

        .tabs {
            display: flex;
            gap: 4px;
            max-width: 800px;
            margin: 0 auto;
        }

        .tab {
            padding: 14px 24px;
            background: transparent;
            color: #9ca3af;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s;
            border-radius: 8px 8px 0 0;
        }

        .tab:hover {
            background: #2a2b32;
            color: #e5e7eb;
        }

        .tab.active {
            color: white;
            background: #343541;
            border-bottom: 2px solid #10a37f;
        }

        /* Main Chat Area - ChatGPT Style */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .messages {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .message {
            display: flex;
            gap: 20px;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .message.user {
            background: transparent;
        }

        .message.assistant {
            background: #444654;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: #10a37f;
        }

        .message.assistant .message-avatar {
            background: #19c37d;
        }

        .message-content {
            flex: 1;
            line-height: 1.6;
            color: #ececf1;
            white-space: pre-wrap;
        }

        /* Image Output Styling */
        .generated-image {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 10px;
        }

        /* Audio Player Styling */
        .audio-player {
            margin-top: 10px;
        }

        audio {
            width: 100%;
            max-width: 400px;
        }

        /* Input Area - ChatGPT Style */
        .input-container {
            border-top: 1px solid #4a4b53;
            background: #343541;
            padding: 20px;
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        .input-area {
            width: 100%;
            padding: 14px 50px 14px 18px;
            background: #40414f;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
        }

        .input-area:focus {
            outline: none;
            background: #4a4b53;
        }

        .input-area::placeholder {
            color: #8e8ea0;
        }

        .send-btn {
            position: absolute;
            right: 12px;
            bottom: 12px;
            background: #10a37f;
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            color: white;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .send-btn:hover {
            background: #1a7f64;
        }

        /* Mode-specific input hints */
        .mode-hint {
            font-size: 0.75rem;
            color: #8e8ea0;
            margin-top: 8px;
            text-align: center;
        }

        /* Loading animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #10a37f;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Select dropdown for text mode */
        .mode-select {
            background: #40414f;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .mode-select option {
            background: #343541;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="tabs">
            <button class="tab active" onclick="switchMode('text')">📝 Text Generation</button>
            <button class="tab" onclick="switchMode('image')">🖼️ Image Generation</button>
            <button class="tab" onclick="switchMode('audio')">🎵 Audio Generation</button>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="messages" id="messages">
            <div class="message assistant">
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    Hello! I'm your AI Content Generator.<br><br>
                    Select a mode from the tabs above and tell me what to create!
                </div>
            </div>
        </div>
    </div>

    <div class="input-container">
        <div class="input-wrapper">
            <!-- Text Mode Input Area -->
            <div id="textInputArea">
                <select id="contentTypeSelect" class="mode-select">
                    <option value="blog">📝 Blog Post</option>
                    <option value="email">✉️ Email</option>
                    <option value="code">💻 Code</option>
                    <option value="social">📱 Social Media Post</option>
                </select>
                <textarea id="textInput" class="input-area" rows="2" placeholder="Describe what you want to create..."></textarea>
            </div>

            <!-- Image Mode Input Area -->
            <div id="imageInputArea" style="display: none;">
                <textarea id="imageInput" class="input-area" rows="2" placeholder="Describe the image you want to generate..."></textarea>
            </div>

            <!-- Audio Mode Input Area -->
            <div id="audioInputArea" style="display: none;">
                <textarea id="audioInput" class="input-area" rows="2" placeholder="Enter text to convert to speech..."></textarea>
            </div>

            <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
        <div class="mode-hint" id="modeHint">💡 Text Mode: Generate blog posts, emails, code, or social media content</div>
    </div>

    <script>
        let currentMode = 'text';

        function switchMode(mode) {
            currentMode = mode;

            // Update tab styles
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');

            // Show/hide input areas
            document.getElementById('textInputArea').style.display = mode === 'text' ? 'block' : 'none';
            document.getElementById('imageInputArea').style.display = mode === 'image' ? 'block' : 'none';
            document.getElementById('audioInputArea').style.display = mode === 'audio' ? 'block' : 'none';

            // Update hint text
            const hint = document.getElementById('modeHint');
            if (mode === 'text') hint.innerHTML = '💡 Text Mode: Generate blog posts, emails, code, or social media content';
            else if (mode === 'image') hint.innerHTML = '🖼️ Image Mode: Describe any image and AI will generate it';
            else hint.innerHTML = '🎵 Audio Mode: Enter text and AI will convert it to speech';
        }

        function addMessage(content, isUser, isImage = false, imageUrl = null, isAudio = false, audioUrl = null) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = isUser ? '👤' : '🤖';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            if (isImage && imageUrl) {
                contentDiv.innerHTML = `<img src="${imageUrl}" class="generated-image" alt="Generated Image">`;
            } else if (isAudio && audioUrl) {
                contentDiv.innerHTML = `<div class="audio-player"><audio controls src="${audioUrl}"></audio></div>`;
            } else {
                contentDiv.innerHTML = content.replace(/\n/g, '<br>');
            }

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);

            // Scroll to bottom
            const container = document.getElementById('chatContainer');
            container.scrollTop = container.scrollHeight;
        }

        function showTypingIndicator() {
            const messagesDiv = document.getElementById('messages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="loading"></div> Generating...
                </div>
            `;
            messagesDiv.appendChild(typingDiv);
            const container = document.getElementById('chatContainer');
            container.scrollTop = container.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        async function sendMessage() {
            let userMessage = '';
            let contentType = 'blog';

            if (currentMode === 'text') {
                userMessage = document.getElementById('textInput').value.trim();
                contentType = document.getElementById('contentTypeSelect').value;
                document.getElementById('textInput').value = '';
            } else if (currentMode === 'image') {
                userMessage = document.getElementById('imageInput').value.trim();
                document.getElementById('imageInput').value = '';
            } else if (currentMode === 'audio') {
                userMessage = document.getElementById('audioInput').value.trim();
                document.getElementById('audioInput').value = '';
            }

            if (!userMessage) return;

            // Add user message to chat
            addMessage(userMessage, true);

            // Show typing indicator
            showTypingIndicator();

            try {
                if (currentMode === 'text') {
                    const response = await fetch('/generate/text', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            prompt: userMessage,
                            contentType: contentType
                        })
                    });
                    const data = await response.json();
                    removeTypingIndicator();
                    addMessage(data.response, false);

                } else if (currentMode === 'image') {
                    const response = await fetch('/generate/image', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt: userMessage })
                    });
                    const data = await response.json();
                    removeTypingIndicator();
                    addMessage('', false, true, data.imageUrl);

                } else if (currentMode === 'audio') {
                    // Audio endpoint - we'll add this next
                    removeTypingIndicator();
                    addMessage('Audio generation coming soon! 🎵', false);
                }

            } catch (error) {
                removeTypingIndicator();
                addMessage('Sorry, an error occurred. Please try again.', false);
            }
        }

        // Allow Enter to send
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                const activeElement = document.activeElement;
                if (activeElement && activeElement.classList && activeElement.classList.contains('input-area')) {
                    e.preventDefault();
                    sendMessage();
                }
            }
        });
    </script>
</body>
</html>
